# GitHub Actions workflow for building and publishing nf-report plugin
# This workflow builds the project and uploads the distribution zip as an artifact

name: Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and Release
        env:
          NPR_API_KEY: ${{ secrets.NPR_API_KEY }}
        run: ./gradlew releasePlugin
