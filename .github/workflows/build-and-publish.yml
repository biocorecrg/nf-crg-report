# GitHub Actions workflow for building and publishing nf-report plugin
# This workflow builds the project and uploads the distribution zip as an artifact

name: Build and Publish nf-report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Publish distribution zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: nf-report-${{ github.sha }}
          path: build/distributions/*.zip
