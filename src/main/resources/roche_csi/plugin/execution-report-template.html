<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #000000;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>Execution Report</h1>
    <p>Report Type: ${report_type}</p>
    <p>Generated At: ${generated_at}</p>

    <h2>Events</h2>
    <table>
        <thead>
            <tr>
                <th>Event Type</th>
                <th>Timestamp</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            <% events.each { event -> %>
            <tr>
                <td>${event.event_type}</td>
                <td>${event.timestamp}</td>
                <td>
                    <ul>
                        <% event.each { key, value -> %>
                        <li><strong>${key}:</strong> ${value}</li>
                        <% } %>
                    </ul>
                </td>
            </tr>
            <% } %>
        </tbody>
    </table>
</body>
</html>
